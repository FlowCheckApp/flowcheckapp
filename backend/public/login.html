<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Log in — FlowCheck</title>
  <meta name="robots" content="noindex">
  <link rel="stylesheet" href="/css/site.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">
      <div class="nav-logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M4 4h16v3H4zm0 6h11v3H4zm0 6h7v3H4z"/></svg></div>
      FlowCheck
    </a>
    <div class="nav-links" id="nav-links">
      <a href="/features">Features</a><a href="/pricing">Pricing</a>
      <a href="https://apps.apple.com/app/flowcheck/id6742624701" class="nav-cta">Download App</a>
    </div>
    <button id="nav-menu-btn" aria-label="Menu" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="nav-logo-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M4 4h16v3H4zm0 6h11v3H4zm0 6h7v3H4z"/></svg></div>
      FlowCheck
    </div>
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Log in to manage your account and referrals.</div>

    <div id="auth-alert" class="auth-alert" role="alert"></div>

    <!-- Google -->
    <button class="auth-social-btn" id="btn-google" style="width:100%;margin-bottom:12px">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="auth-divider"><span>or</span></div>

    <form class="auth-form" id="login-form" novalidate>
      <div class="form-field">
        <label class="form-label" for="email">Email</label>
        <input class="form-input" type="email" id="email" autocomplete="email" placeholder="you@example.com" required>
      </div>
      <div class="form-field">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <a href="/forgot-password" style="font-size:13px;color:var(--muted);text-align:right;text-decoration:none;margin-top:-6px">Forgot password?</a>
      <button type="submit" class="auth-submit" id="submit-btn">Log in</button>
    </form>

    <div class="auth-footer-link">
      Don't have an account? <a href="/signup">Sign up free →</a>
    </div>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey:            'AIzaSyBtdCUetv2nRPiaZVt-_TXUtd77wxqLVSw',
    authDomain:        'flowcheck-46570.firebaseapp.com',
    projectId:         'flowcheck-46570',
    storageBucket:     'flowcheck-46570.firebasestorage.app',
    messagingSenderId: '305596636244',
    appId:             '1:305596636244:web:75dc2c36fbc8afc9bca1c1',
  });
  const auth = firebase.auth();

  // Redirect if already logged in
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = '/account';
  });

  function showAlert(msg, type) {
    const el = document.getElementById('auth-alert');
    el.textContent = msg;
    el.className = 'auth-alert ' + type;
  }

  function setLoading(loading) {
    const btn = document.getElementById('submit-btn');
    btn.disabled = loading;
    btn.textContent = loading ? 'Logging in…' : 'Log in';
  }

  // Email/password login
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return;
    setLoading(true);
    try {
      await auth.signInWithEmailAndPassword(email, password);
      // onAuthStateChanged will redirect
    } catch (err) {
      setLoading(false);
      const msgs = {
        'auth/user-not-found':   'No account found with that email.',
        'auth/wrong-password':   'Incorrect password. Try again.',
        'auth/invalid-email':    'Please enter a valid email address.',
        'auth/too-many-requests':'Too many attempts. Try again later.',
      };
      showAlert(msgs[err.code] || err.message, 'error');
    }
  });

  // Google sign-in
  document.getElementById('btn-google').addEventListener('click', async () => {
    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithPopup(provider);
      // onAuthStateChanged handles redirect
    } catch (err) {
      if (err.code !== 'auth/popup-closed-by-user') {
        showAlert('Google sign-in failed. Please try again.', 'error');
      }
    }
  });
</script>
<script src="/js/site.js"></script>
</body>
</html>
