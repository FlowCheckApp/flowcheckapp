name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    name: Backend syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check server.js
        run: node --check server.js

      - name: Syntax check referral.js
        run: node --check referral.js

  lint-frontend:
    name: Frontend syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Syntax check JS files
        run: |
          for f in www/js/fc-app.js www/js/fc-auth.js www/js/fc-data.js www/js/fc-iap.js; do
            echo "Checking $f..."
            node --check "$f"
          done
